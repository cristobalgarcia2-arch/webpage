<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenidos a la Torre de Merlín</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Ebenecser&family=IM+Fell+English+SC&family=IM+Fell+DW+Pica&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Colores: Púrpura místico, Oro viejo y Negro profundo */
            --color-fondo: #0a0a12; /* Un negro azulado muy oscuro */
            --color-pergamino: #e4dcc7;
            --color-acento: #bd9af7; /* Un violeta mágico brillante */
            --color-oro: #d4af37;
            --borde-magico: 2px solid var(--color-oro);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--color-fondo);
            /* Imagen de fondo sutil: estrellas o textura de piedra (opcional) */
            background-image: radial-gradient(circle, rgba(29,32,58,1) 0%, rgba(10,10,18,1) 100%);
            color: var(--color-pergamino);
            font-family: 'IM Fell DW Pica', serif; /* Fuente de libro antiguo */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Brillo mágico de fondo */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--color-acento);
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.2;
            z-index: -1;
            animation: resplandor 10s infinite alternate;
        }

        .contenedor-pergamino {
            text-align: center;
            padding: 60px;
            max-width: 700px;
            background-color: rgba(15, 15, 25, 0.9); /* Fondo oscuro casi transparente */
            border: var(--borde-magico);
            box-shadow: 0 0 30px rgba(189, 154, 247, 0.3), inset 0 0 15px rgba(212, 175, 55, 0.2);
            position: relative;
            border-radius: 10px;
        }

        /* Esquinas decorativas al estilo antiguo */
        .contenedor-pergamino::before, .contenedor-pergamino::after {
            content: '✧';
            position: absolute;
            color: var(--color-oro);
            font-size: 1.5rem;
        }
        .contenedor-pergamino::before { top: 10px; left: 10px; }
        .contenedor-pergamino::after { bottom: 10px; right: 10px; }

        h1 {
            font-family: 'Cinzel Decorative', cursive; /* Fuente gótica/fantástica */
            font-size: 3.5rem;
            margin-bottom: 5px;
            margin-top: 0;
            color: var(--color-oro);
            text-shadow: 0 0 15px var(--color-oro), 0 0 3px var(--color-acento);
            letter-spacing: 3px;
        }

        .subtitulo {
            font-family: 'IM Fell English SC', serif;
            color: var(--color-acento);
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 30px;
        }

        .separador-magico {
            font-size: 2rem;
            color: var(--color-oro);
            margin: 20px 0;
            user-select: none;
        }

        p {
            font-size: 1.3rem;
            line-height: 1.8;
            font-weight: 300;
            max-width: 80%;
            margin: 0 auto 40px auto;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .boton-encantado {
            display: inline-block;
            padding: 15px 40px;
            border: 1px solid var(--color-acento);
            background: transparent;
            color: var(--color-acento);
            text-decoration: none;
            text-transform: uppercase;
            font-family: 'IM Fell English SC', serif;
            font-size: 1rem;
            letter-spacing: 3px;
            position: relative;
            overflow: hidden;
            transition: all 0.5s ease;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(189, 154, 247, 0.2);
        }

        .boton-encantado:hover {
            border-color: var(--color-oro);
            color: var(--color-fondo);
            background-color: var(--color-oro);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.6);
        }

        /* Animación de resplandor rítmico */
        @keyframes resplandor {
            0% { transform: scale(1); opacity: 0.2; }
            100% { transform: scale(1.5); opacity: 0.3; }
        }

        /* Ajustes para móviles */
        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .contenedor-pergamino { padding: 30px; width: 90%; }
            p { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="contenedor-pergamino">
        <h1>Bienvenidos, buscadores de arcana</h1>
        <div class="subtitulo">Al portal de la sabiduría antigua</div>
        
        <div class="separador-magico">🕀 ✧ 🕀</div>
        
        <p>Adentraros en este refugio elemental. <br> 
           Aquí, las runas del código conjuran realidades y los secretos del éter digital os serán revelados.</p>
        
        <a href="#" class="boton-encantado">Desvelar el Misterio</a>
    </div>

</body>
</html>
