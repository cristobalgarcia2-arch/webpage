<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Taberna de las Pruebas - Bienvenidos</title>
    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Grenze+Gotisch:wght@600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Paleta: Marrones madera, Oro viejo, Negro ceniza */
            --color-fondo: #1a120b; /* Marrón muy oscuro, casi negro */
            --color-madera-clara: #aa8967; /* Textura de madera desgastada */
            --color-oro-sucio: #c09d52; 
            --color-pergamino-oscuro: #d9c4a0;
            --color-hierro: #333333;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--color-fondo);
            /* Usamos un degradado que simula la luz de una vela central */
            background-image: radial-gradient(circle, #2c1e12 0%, #1a120b 100%);
            color: var(--color-pergamino-oscuro);
            font-family: 'IM Fell English', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* El letrero de la taberna */
        .letrero-taberna {
            text-align: center;
            padding: 50px 60px;
            max-width: 650px;
            background-color: #26190e; /* Color madera oscura */
            
            /* Bordes que simulan madera tallada y hierro */
            border: 8px solid #3a2514;
            outline: 2px solid var(--color-hierro);
            
            /* Sombra pesada para dar volumen */
            box-shadow: 0 15px 35px rgba(0,0,0,0.8), inset 0 0 15px rgba(0,0,0,0.5);
            
            position: relative;
            border-radius: 4px;
        }

        /* "Remaches" de hierro en las esquinas */
        .letrero-taberna::before {
            content: '';
            position: absolute;
            top: 10px; left: 10px; width: 15px; height: 15px;
            background: var(--color-hierro); border-radius: 50%;
            box-shadow: 610px 0 var(--color-hierro), 0 350px var(--color-hierro), 610px 350px var(--color-hierro);
        }

        h1 {
            font-family: 'Grenze Gotisch', cursive; /* Fuente gótica fuerte */
            font-size: 3.8rem;
            margin: 0 0 10px 0;
            color: var(--color-oro-sucio);
            text-transform: uppercase;
            letter-spacing: 2px;
            /* Efecto de quemado/tallado sutil */
            text-shadow: 2px 2px 0px rgba(0,0,0,0.8);
        }

        .divisor-taberna {
            width: 80%;
            height: 4px;
            background: var(--color-hierro);
            margin: 20px auto;
            position: relative;
        }
        .divisor-taberna::after {
            content: '🍺'; /* O un icono de martillo/espada si prefieres */
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: #26190e;
            padding: 0 10px;
            font-size: 1.5rem;
        }

        p {
            font-family: 'Almendra', serif;
            font-size: 1.4rem;
            line-height: 1.6;
            color: var(--color-pergamino-oscuro);
            margin-bottom: 40px;
            font-style: italic;
        }

        .boton-taberna {
            display: inline-block;
            padding: 15px 45px;
            background-color: #5d4037; /* Marrón rojizo */
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            font-family: 'Grenze Gotisch', cursive;
            font-size: 1.2rem;
            letter-spacing: 1px;
            border: 3px solid #3a2514;
            transition: all 0.3s ease;
            box-shadow: 0 5px 0px #3a2514; /* Efecto 3D de madera */
        }

        .boton-taberna:hover {
            background-color: #795548;
            transform: translateY(2px);
            box-shadow: 0 3px 0px #3a2514;
            cursor: pointer;
        }

        .boton-taberna:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0px #3a2514;
        }

        /* Ajustes para móviles */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .letrero-taberna { padding: 30px; width: 85%; border-width: 5px; }
            p { font-size: 1.1rem; }
            .letrero-taberna::before { display: none; } /* Quitamos remaches en móvil */
        }
    </style>
</head>
<body>

    <div class="letrero-taberna">
        <h1>¡Salud, nobles viajeros!</h1>
        
        <div class="divisor-taberna"></div>
        
        <p>Habéis encontrado refugio en la Posada del Código Local.<br> 
           Descansad vuestros pies, pedid una pinta de bits y preparaos para la aventura.</p>
        
        <a href="#" class="boton-taberna">Acercarse a la barra</a>
    </div>

</body>
</html>
