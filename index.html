<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo de Acceso | Nodo 01</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon-cian: #00f3ff;
            --neon-rosa: #ff0055;
            --fondo-oscuro: #050505;
            --texto-base: #a0f6ff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--fondo-oscuro);
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px; /* Cuadrícula de fondo */
            color: var(--texto-base);
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* Efecto de parpadeo de línea de escaneo */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        .frame-interfaz {
            position: relative;
            padding: 60px;
            background: rgba(0, 243, 255, 0.02);
            border: 1px solid var(--neon-cian);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2), inset 0 0 20px rgba(0, 243, 255, 0.1);
            /* Corte de esquina futurista */
            clip-path: polygon(0 0, 90% 0, 100% 10%, 100% 100%, 10% 100%, 0 90%);
            max-width: 600px;
            text-align: center;
        }

        /* Decoración de esquina superior izquierda */
        .corner-tag {
            position: absolute;
            top: 0; left: 0;
            background: var(--neon-cian);
            color: black;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 10px;
            font-family: 'Orbitron', sans-serif;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            margin: 0;
            color: white;
            text-shadow: 0 0 10px var(--neon-cian), 0 0 20px var(--neon-cian);
            letter-spacing: 5px;
        }

        .glitch-text {
            color: var(--neon-rosa);
            font-size: 0.9rem;
            letter-spacing: 3px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.4;
            margin-bottom: 40px;
            opacity: 0.8;
        }

        .btn-cyber {
            position: relative;
            padding: 15px 40px;
            background: transparent;
            color: var(--neon-cian);
            border: 1px solid var(--neon-cian);
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            overflow: hidden;
        }

        .btn-cyber:hover {
            background: var(--neon-cian);
            color: black;
            box-shadow: 0 0 30px var(--neon-cian);
        }

        /* Animación de escaneo */
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 8;
            background: linear-gradient(0deg, rgba(0, 243, 255, 0) 0%, rgba(0, 243, 255, 0.1) 50%, rgba(0, 243, 255, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }

    </style>
</head>
<body>

    <div class="frame-interfaz">
        <div class="corner-tag">ID_STATUS: SECURE</div>
        <div class="scanline"></div>
        
        <div class="glitch-text">> SISTEMA EN LÍNEA _</div>
        <h1>BIENVENIDOS, OPERADORES</h1>
        
        <p>Sincronización de red completada.<br> 
           Iniciando protocolo de bienvenida en el nodo local.</p>
        
        <button class="btn-cyber">INICIALIZAR SESIÓN</button>
    </div>

</body>
</html>
