<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenidos | Sitio Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --color-fondo: #0f1115;
            --color-texto: #e5e5e5;
            --color-acento: #c5a059; /* Un tono dorado sofisticado */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--color-fondo);
            color: var(--color-texto);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .contenedor {
            text-align: center;
            padding: 40px;
            border: 1px solid rgba(197, 160, 89, 0.2); /* Borde sutil dorado */
            max-width: 600px;
            background: linear-gradient(145deg, #16181d, #0f1115);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            color: var(--color-acento);
        }

        .linea {
            width: 60px;
            height: 2px;
            background-color: var(--color-acento);
            margin: 20px auto;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            letter-spacing: 1px;
            font-weight: 300;
            opacity: 0.8;
        }

        .boton {
            margin-top: 30px;
            display: inline-block;
            padding: 12px 30px;
            border: 1px solid var(--color-acento);
            color: var(--color-acento);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: all 0.4s ease;
        }

        .boton:hover {
            background-color: var(--color-acento);
            color: var(--color-fondo);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>Estimados caballeros</h1>
        <div class="linea"></div>
        <p>Bienvenidos a este espacio de pruebas.<br> 
           Es un honor recibirles en nuestra plataforma experimental.</p>
        <a href="#" class="boton">Ingresar al sitio</a>
    </div>

</body>
</html>
